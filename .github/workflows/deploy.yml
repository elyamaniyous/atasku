name: Deploy to Railway
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: atasku
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
